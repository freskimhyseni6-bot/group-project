    <style>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const locations = [
  {
    name: "SachPizza Prishtinë - Qender",
    city: "Prishtinë",
    country: "Kosovo",
    coords: [42.6629, 21.1655]
  },
  {
    name: "SachPizza Lipjan",
    city: "Lipjan",
    country: "Kosovo",
    coords: [42.5215, 21.1256]
  },
  {
    name: "SachPizza Ferizaj",
    city: "Ferizaj",
    country: "Kosovo",
    coords: [42.3702, 21.1553]
  },

  {
    name: "Sachcaffe East Gate Mall",
    city: "Skopje",
    country: "North Macedonia",
    coords: [41.9981, 21.4254]
  },
  {
    name: "Sachcaffe Skopje Center",
    city: "Skopje",
    country: "North Macedonia",
    coords: [41.9965, 21.4314]
  },

  {
    name: "Sachcaffe Tiranë",
    city: "Tiranë",
    country: "Albania",
    coords: [41.3275, 19.8187]
  },
  {
    name: "SachPizza Durrës",
    city: "Durrës",
    country: "Albania",
    coords: [41.3231, 19.4414]
  }
];

const map = L.map('map').setView([42.5, 20.9], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

const container = document.getElementById("locations");
let markers = [];

function render(list) {
  container.innerHTML = "";
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  list.forEach((loc, index) => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<h3>${loc.name}</h3><p>${loc.city}</p>`;

    const marker = L.marker(loc.coords).addTo(map)
      .bindPopup(loc.name);

    markers.push(marker);

    card.onclick = () => {
      document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
      card.classList.add("active");

      map.setView(loc.coords, 13);
      marker.openPopup();
    };

    container.appendChild(card);
  });
}

document.getElementById("search").addEventListener("input", (e) => {
  const value = e.target.value.toLowerCase();
  const filtered = locations.filter(loc =>
    loc.city.toLowerCase().includes(value)
  );
  render(filtered);
});

render(locations);
</script>
